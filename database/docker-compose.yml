services:
  db:
    restart: unless-stopped
    image: postgres:latest
    container_name: civil_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    env_file:
      - '.env'
    networks:
      - civil_network

volumes:
  postgres_data:
    driver: local

networks:
  civil_network:
    driver: bridge